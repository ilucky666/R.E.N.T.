<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能寻房</title>
    <!-- 使用 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Google 现代字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; /* 极深灰/黑背景 */
            --surface: #18181b; /* 稍微亮的表面颜色 */
            --surface-glass: rgba(24, 24, 27, 0.7); /* 玻璃态 */
            --primary: #6366f1; /* 活力蓝紫色 */
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7; /* 紫色渐变辅助 */
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 模拟移动端容器 */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background-color: var(--bg);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* 顶部 Header */
        header {
            padding: 20px;
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 视图管理 */
        .view {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-top: 70px;
            padding-bottom: 90px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 1. Chat 界面 --- */
        .chat-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .message.user .avatar {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .msg-bubble {
            background: var(--surface);
            padding: 14px 18px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            font-size: 15px;
            line-height: 1.5;
            border: 1px solid var(--border);
        }

        .message.user .msg-bubble {
            background: var(--primary);
            border-color: var(--primary);
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .chat-bottom {
            padding: 16px;
            background: var(--bg);
            position: absolute;
            bottom: 80px;
            width: 100%;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .quick-replies {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: none;
        }
        
        .quick-replies::-webkit-scrollbar {
            display: none;
        }

        .chip {
            white-space: nowrap;
            padding: 10px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover, .chip:active {
            background: var(--border);
            transform: scale(0.98);
        }

        .input-area {
            display: flex;
            gap: 10px;
            background: var(--surface);
            padding: 8px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 0 16px;
            font-size: 15px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .send-btn:active {
            transform: scale(0.9);
        }

        /* --- 2. Results 界面 --- */
        .results-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: row;
            height: 140px;
            position: relative;
            transition: transform 0.2s;
        }

        .result-card:active {
            transform: scale(0.98);
        }

        .card-img {
            width: 130px;
            background-color: #27272a;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        /* 默认占位图效果 */
        .img-1 { background: linear-gradient(45deg, #1e293b, #334155); }
        .img-2 { background: linear-gradient(45deg, #281537, #4c1d95); }
        .img-3 { background: linear-gradient(45deg, #064e3b, #047857); }

        .match-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #34d399; /* 翡翠绿 */
            border: 1px solid rgba(52, 211, 153, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-info {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
        }

        .card-tags span {
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            color: var(--text-muted);
        }

        .card-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            align-self: flex-end;
            margin-top: auto;
        }
        
        .card-price span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* --- 3. Map 界面 --- */
        #view-map {
            padding: 0;
            overflow: hidden;
        }

        .map-bg {
            position: absolute;
            inset: 0;
            background-color: #050505;
            background-image: 
                linear-gradient(var(--surface) 1px, transparent 1px),
                linear-gradient(90deg, var(--surface) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .map-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 呼吸圈表示通勤范围 */
        .commute-radius {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(99,102,241,0.05) 60%, transparent 100%);
            border: 1px dashed rgba(99,102,241,0.4);
            animation: pulse 3s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .radius-outer { width: 320px; height: 320px; }
        .radius-inner { 
            width: 180px; height: 180px; 
            border-color: rgba(168, 85, 247, 0.5); 
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 100%); 
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .map-pin {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px var(--primary), 0 0 20px var(--primary);
            position: relative;
            z-index: 3;
        }

        .map-controls {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 20px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }

        .control-panel {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
        }

        .control-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transport-modes {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: rgba(99,102,241,0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .time-slider {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        
        .time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid var(--primary);
            cursor: pointer;
        }
        
        .time-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 底部导航 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            width: 60px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--text);
        }

        .nav-item.active i {
            color: var(--primary);
            transform: translateY(-2px);
            filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.5));
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- 顶部 Header -->
    <header>
        <h1>AI 智能寻房</h1>
        <i data-lucide="bell" class="icon" style="color: var(--text-muted); width: 20px;"></i>
    </header>

    <!-- 1. Chat 界面 -->
    <div id="view-chat" class="view active">
        <div class="chat-content" id="chat-content">
            <div class="message ai-message">
                <div class="avatar">
                    <i data-lucide="bot" style="width: 20px; color: white;"></i>
                </div>
                <div class="msg-bubble">你好！我是你的专属寻房助手。为了帮你找到最理想的家，我们可以先聊聊你的需求。</div>
            </div>
        </div>

        <div class="chat-bottom">
            <div class="quick-replies">
                <button class="chip" onclick="sendMsg('你在哪里工作？')">你在哪里工作？</button>
                <button class="chip" onclick="sendMsg('可接受通勤多久？')">可接受通勤多久？</button>
                <button class="chip" onclick="sendMsg('喜欢安静还是热闹？')">喜欢安静还是热闹？</button>
            </div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="输入您的需求..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendInput()">
                    <i data-lucide="send" style="width: 18px; margin-left: -2px;"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 2. Results 界面 -->
    <div id="view-results" class="view">
        <div class="results-content">
            <!-- 房源卡片 1 -->
            <div class="result-card">
                <div class="card-img img-1">
                    <div class="match-badge">
                        <i data-lucide="sparkles" style="width: 12px; height: 12px;"></i> 98%
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-title">星河湾 1居室</div>
                        <div class="card-sub">距离公司 30mins · 安静宜居</div>
                        <div class="card-tags">
                            <span>朝南</span>
                            <span>近地铁</span>
                        </div>
                    </div>
                    <div class="card-price">¥ 4,500<span>/月</span></div>
                </div>
            </div>

            <!-- 房源卡片 2 -->
            <div class="result-card">
                <div class="card-img img-2">
                    <div class="match-badge">
                        <i data-lucide="sparkles" style="width: 12px; height: 12px;"></i> 92%
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-title">绿地中心 2居室</div>
                        <div class="card-sub">距离公司 15mins · 繁华商圈</div>
                        <div class="card-tags">
                            <span>精装修</span>
                            <span>高楼层</span>
                        </div>
                    </div>
                    <div class="card-price">¥ 5,800<span>/月</span></div>
                </div>
            </div>

            <!-- 房源卡片 3 -->
            <div class="result-card">
                <div class="card-img img-3">
                    <div class="match-badge">
                        <i data-lucide="sparkles" style="width: 12px; height: 12px;"></i> 85%
                    </div>
                </div>
                <div class="card-info">
                    <div>
                        <div class="card-title">科技园青年公寓 1居</div>
                        <div class="card-sub">距离公司 5mins · 步行即达</div>
                        <div class="card-tags">
                            <span>包物业</span>
                            <span>独卫</span>
                        </div>
                    </div>
                    <div class="card-price">¥ 4,200<span>/月</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Map 界面 -->
    <div id="view-map" class="view">
        <div class="map-bg"></div>
        <div class="map-layer">
            <div class="commute-radius radius-outer" id="radius-outer">
                <div class="commute-radius radius-inner" id="radius-inner"></div>
            </div>
            <div class="map-pin"></div>
        </div>

        <div class="map-controls">
            <div class="control-panel">
                <div class="control-title">
                    <i data-lucide="map-pin" style="width: 16px; color: var(--primary);"></i>
                    以 您的公司 为起点
                </div>
                <div class="transport-modes">
                    <div class="mode-btn" onclick="updateMap(this)">
                        <i data-lucide="footprints" style="width: 20px;"></i>
                        步行
                    </div>
                    <div class="mode-btn active" onclick="updateMap(this)">
                        <i data-lucide="train-track" style="width: 20px;"></i>
                        地铁
                    </div>
                    <div class="mode-btn" onclick="updateMap(this)">
                        <i data-lucide="car" style="width: 20px;"></i>
                        驾车
                    </div>
                </div>
                
                <input type="range" class="time-slider" id="time-slider" min="15" max="60" step="15" value="30" onchange="updateMapSize()">
                <div class="time-labels">
                    <span>15分钟</span>
                    <span>30分钟</span>
                    <span>45分钟</span>
                    <span>60分钟</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-view="view-chat">
            <i data-lucide="message-square"></i>
            <span>AI 对话</span>
        </div>
        <div class="nav-item" data-view="view-results">
            <i data-lucide="list"></i>
            <span>房源推荐</span>
        </div>
        <div class="nav-item" data-view="view-map">
            <i data-lucide="map"></i>
            <span>通勤地图</span>
        </div>
    </nav>

</div>

<script>
    // 初始化图标
    lucide.createIcons();

    // 导航切换逻辑
    const tabs = document.querySelectorAll('.nav-item');
    const views = document.querySelectorAll('.view');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            views.forEach(v => v.classList.remove('active'));
            
            tab.classList.add('active');
            const viewId = tab.getAttribute('data-view');
            document.getElementById(viewId).classList.add('active');
        });
    });

    // 聊天逻辑
    function sendMsg(text) {
        if(!text.trim()) return;
        
        const chatContent = document.getElementById('chat-content');
        
        // 用户消息
        const userMsg = document.createElement('div');
        userMsg.className = 'message user';
        userMsg.innerHTML = `
            <div class="avatar"><i data-lucide="user" style="width: 18px;"></i></div>
            <div class="msg-bubble">${text}</div>
        `;
        chatContent.appendChild(userMsg);
        
        chatContent.scrollTop = chatContent.scrollHeight;

        // 模拟 AI 回复
        setTimeout(() => {
            const aiMsg = document.createElement('div');
            aiMsg.className = 'message ai-message';
            
            let replyText = "收到！正在为您匹配符合条件的房源，请稍候...";
            if(text.includes("工作")) replyText = "好的，请问您的公司具体在哪个商圈或地铁站附近呢？";
            if(text.includes("通勤")) replyText = "明白！通勤时间是租房最重要的考量，您可以切换到【通勤地图】页面查看不同交通方式的范围哦。";
            if(text.includes("安静")) replyText = "没问题，我会为您重点推荐周边有公园、远离主干道的宜居小区。";

            aiMsg.innerHTML = `
                <div class="avatar"><i data-lucide="bot" style="width: 20px; color: white;"></i></div>
                <div class="msg-bubble">${replyText}</div>
            `;
            chatContent.appendChild(aiMsg);
            lucide.createIcons();
            chatContent.scrollTop = chatContent.scrollHeight;
        }, 800);
        
        lucide.createIcons();
    }

    function sendInput() {
        const input = document.getElementById('chat-input');
        sendMsg(input.value);
        input.value = '';
    }

    function handleKey(e) {
        if(e.key === 'Enter') {
            sendInput();
        }
    }

    // 地图交互逻辑 (模拟缩放呼吸圈)
    function updateMap(element) {
        const modeBtns = document.querySelectorAll('.mode-btn');
        modeBtns.forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        updateMapSize();
    }

    function updateMapSize() {
        const slider = document.getElementById('time-slider');
        const activeBtn = document.querySelector('.mode-btn.active').innerText.trim();
        const outer = document.getElementById('radius-outer');
        const inner = document.getElementById('radius-inner');
        
        let multiplier = 1;
        if(activeBtn === '步行') multiplier = 0.5;
        if(activeBtn === '地铁') multiplier = 1.2;
        if(activeBtn === '驾车') multiplier = 1.5;

        const baseSize = parseInt(slider.value) * 6; // base calculation
        
        outer.style.width = (baseSize * multiplier) + 'px';
        outer.style.height = (baseSize * multiplier) + 'px';
        
        inner.style.width = (baseSize * multiplier * 0.5) + 'px';
        inner.style.height = (baseSize * multiplier * 0.5) + 'px';
    }
    
    // 初始化地图大小
    updateMapSize();

</script>

</body>
</html>
